services:
  sgn-dash:
    env_file:
      - ./.env
    environment:
      DB_PORT: ${DB_PORT:-5432}
      DB_URL: postgresql://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT:-5432}/${DB_DATABASE}
    image: ghcr.io/ancients-of-resonite/sgn-dash:latest
    restart: always
    ports:
      - "${DASH_PORT:-3000}:3000"
    depends_on:
      sgn-server:
        condition: service_healthy
  sgn-server:
    env_file:
      - ./.env
    environment:
      DB_PORT: ${DB_PORT:-5432}
      DB_URL: postgresql://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT:-5432}/${DB_DATABASE}
    image: ghcr.io/ancients-of-resonite/sgn-server:latest
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    ports:
      - "${SOCKET_PORT:-8000}:8000"
    depends_on:
      database:
        condition: service_healthy
  database:
    image: postgres:15
    restart: always
    env_file: ./.env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - sgn-data:/var/lib/postgresql/data # Persistent storage for the database
    ports:
      - "${DB_PORT:-5432}:${DB_PORT:-5432}"
    command: -p ${DB_PORT:-5432} -c "wal_level=logical"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER} -d ${DB_DATABASE} -p ${DB_PORT:-5432}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sgn-data:
