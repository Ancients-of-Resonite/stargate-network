services:
  sgn-dash:
    env_file:
      - ./.env
    image: ghcr.io/ancients-of-resonite/sgn-dash:latest
    ports:
      - "3000:3000"
    depends_on:
      sgn-server:
        condition: service_healthy
  sgn-server:
    env_file:
      - ./.env
    environment:
      DB_URL: postgresql://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT}/${DB_DATABASE}
    image: ghcr.io/ancients-of-resonite/sgn-server:latest
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
  database:
    image: postgres:15
    restart: always
    env_file: ./.env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - sgn-data:/var/lib/postgresql/data # Persistent storage for the database
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sgn-data:
