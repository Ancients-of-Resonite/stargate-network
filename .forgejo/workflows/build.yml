on:
  workflow_dispatch:

jobs:
  build-server:
    runs-on: docker
    steps:
      - name: Git Checkout
        uses: actions/checkout@v4
      - name: Set up Docker
        uses: https://git.uninetwork.net/docker/setup-docker-action@v5
        with:
          rootless: true
      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_KEY }}
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ancients-of-resonite/sgn-server:latest
          file: Dockerfile.server
